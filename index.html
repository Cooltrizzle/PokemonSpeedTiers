<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speed Tiers Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-container">
  <h1 class="page-title">Pokemon Speed Tier Checker</h1>

  <!-- ============================================================
       CONTROL ROW
  ============================================================ -->
  <div class="control-row">

    <!-- 1. NAME SELECTOR -->
    <div class="control-block">
      <div class="control-label">Pokemon</div>
      <input id="nameSelector" type="text" placeholder="Select a name..." autocomplete="off">
      <div id="nameDropdown" class="dropdown-list"></div>
    </div>

    <!-- 2. IMAGE PREVIEW -->
    <div class="control-block">
      <div class="control-label">&nbsp;</div>
      <img id="selectedImage" src="" alt="" class="preview-img">
    </div>

    <!-- 3. NATURE -->
    <div class="control-block">
      <div class="control-label">Nature</div>
      <select id="natureSelect">
        <option value="beneficial">Beneficial</option>
        <option value="neutral" selected>Neutral</option>
        <option value="negative">Negative</option>
      </select>
    </div>

    <!-- 4. EVs -->
    <div class="control-block">
      <div class="control-label">EVs</div>
      <input id="evInput" type="number" min="0" max="32" placeholder="EVs (0–32)">
    </div>

    <!-- 5. SPEED OUTPUT -->
    <div class="control-block">
      <div class="control-label">Speed Stat</div>
      <div id="calcOutput" class="calc-box">—</div>
    </div>

    <!-- 6. BOOST -->
    <div class="control-block">
      <div class="control-label">Boost</div>
      <div class="boost-group">
        <label><input type="radio" name="boost" value="-1"> -1</label>
        <label><input type="radio" name="boost" value="0" checked> 0</label>
        <label><input type="radio" name="boost" value="1"> +1</label>
        <label><input type="radio" name="boost" value="2"> +2</label>
      </div>
    </div>

  </div>

  <!-- ============================================================
       SEARCH BOX
  ============================================================ -->
  <div class="search-container">
    <div class="search-label">Quick Search</div>
    <input id="searchBox" type="text" placeholder="Search name..." />
  </div>

  <!-- ============================================================
       TABLE
  ============================================================ -->
  <div class="table-wrapper">
    <table id="csv-table">

      <colgroup>
        <col class="col-1">
        <col class="col-2">
        <col class="col-3">
        <col class="col-4">
        <col class="col-5">
        <col class="col-6">
        <col class="col-7">
        <col class="col-8">
        <col class="col-9">
        <col class="col-10">
        <col class="col-11">
      </colgroup>

      <thead>
        <tr class="header-row-1">
          <th class="col-1" colspan="3" id="hdr-1-1">Loading…</th>
          <th class="col-4">Trick Room</th>
          <th class="col-5"></th>
          <th class="col-6" colspan="2">Max EVs</th>
          <th class="col-8" colspan="2">Single Boost / Scarf</th>
          <th class="col-10" colspan="2">Double Boost / Tailwind</th>
        </tr>

        <tr class="header-row-2">
          <th class="col-1">Name</th>
          <th class="col-2">Image</th>
          <th class="col-3">Base Speed</th>
          <th class="col-4">Min Speed</th>
          <th class="col-5">Neutral</th>
          <th class="col-6">Neutral +32</th>
          <th class="col-7">Max +32</th>
          <th class="col-8">Neutral +32 / +1</th>
          <th class="col-9">Max +32 / +1</th>
          <th class="col-10">Neutral +32 / +2</th>
          <th class="col-11">Max +32 / +2</th>
        </tr>
      </thead>

      <tbody></tbody>

    </table>
  </div>

</div> <!-- end page-container -->

<!-- ============================================================
     SCRIPT
============================================================ -->
<script>
Promise.all([
  fetch("reg.csv").then(r => r.text()),
  fetch("speed.csv").then(r => r.text())
])
.then(([regText, speedText]) => {

  function parseCSV(text) {
    return text.trim().split("\n").map(row => row.split(","));
  }

  const regData = parseCSV(regText);
  const speedData = parseCSV(speedText);

  /* ============================================================
     BUILD TABLE
  ============================================================ */
  const tableBody = document.querySelector("#csv-table tbody");
  tableBody.innerHTML = "";

  speedData.forEach(row => {
    const tr = document.createElement("tr");

    row.forEach((cell, colIndex) => {
      const td = document.createElement("td");
      td.textContent = cell.trim();
      td.classList.add(`col-${colIndex + 1}`);
      tr.appendChild(td);
    });

    tableBody.appendChild(tr);
  });

  /* ============================================================
     AUTOCOMPLETE
  ============================================================ */
  const nameSelector = document.getElementById("nameSelector");
  const nameDropdown = document.getElementById("nameDropdown");

  function populateDropdown(filter = "") {
    nameDropdown.innerHTML = "";
    const lower = filter.toLowerCase();

    speedData.forEach(row => {
      const name = row[0];
      if (name.toLowerCase().includes(lower)) {
        const div = document.createElement("div");
        div.textContent = name;
        div.classList.add("dropdown-item");

        div.addEventListener("click", () => {
          nameSelector.value = name;
          updateImagePreview(name);

          document.querySelector('input[name="boost"][value="0"]').checked = true;

          calculateFinalSpeed();
          nameDropdown.style.display = "none";
        });

        nameDropdown.appendChild(div);
      }
    });

    nameDropdown.style.display = filter ? "block" : "none";
  }

  nameSelector.addEventListener("input", () => {
    populateDropdown(nameSelector.value);
  });

  document.addEventListener("click", e => {
    if (!nameDropdown.contains(e.target) && e.target !== nameSelector) {
      nameDropdown.style.display = "none";
    }
  });

  /* ============================================================
     IMAGE PREVIEW — FIXED
  ============================================================ */
  function updateImagePreview(selectedName) {
    const img = document.getElementById("selectedImage");

    let regRow = regData.find(r => r[1].trim().toLowerCase() === selectedName.toLowerCase());
    if (!regRow) {
      img.style.visibility = "hidden";
      img.removeAttribute("src");
      return;
    }

    let num = regRow[0].replace("#", "").padStart(4, "0");
    let path = `/Images/Menu_Home_${num}.png`;

    img.src = path;
    img.style.visibility = "visible";
  }

  /* ============================================================
     CONDITIONAL FORMATTING
  ============================================================ */
  function applySpeedHighlighting(finalSpeed) {
    document.querySelectorAll("#csv-table tbody tr").forEach(row => {
      row.classList.remove("speed-higher", "speed-equal");

      const compare = parseInt(row.cells[5].textContent || "0", 10);

      if (compare > finalSpeed) row.classList.add("speed-higher");
      else if (compare === finalSpeed) row.classList.add("speed-equal");
    });
  }

  /* ============================================================
     SPEED CALCULATION
  ============================================================ */
  function calculateFinalSpeed() {
    const selectedName = nameSelector.value.trim();
    const nature = document.getElementById("natureSelect").value;
    const ev = parseInt(document.getElementById("evInput").value || "0", 10);

    let baseSpeed = 0;

    speedData.forEach(row => {
      if (row[0].toLowerCase() === selectedName.toLowerCase()) {
        baseSpeed = parseInt(row[2], 10);
      }
    });

    let finalSpeed = baseSpeed + ev;

    if (nature === "beneficial") finalSpeed = Math.floor(finalSpeed * 1.1);
    if (nature === "negative") finalSpeed = Math.floor(finalSpeed * 0.9);

    const boostValue = parseInt(document.querySelector('input[name="boost"]:checked').value, 10);

    let boostMultiplier = 1;
    if (boostValue === -1) boostMultiplier = 0.667;
    if (boostValue === 0)  boostMultiplier = 1;
    if (boostValue === 1)  boostMultiplier = 1.5;
    if (boostValue === 2)  boostMultiplier = 2;

    finalSpeed = Math.floor(finalSpeed * boostMultiplier);

    document.getElementById("calcOutput").textContent = finalSpeed;

    applySpeedHighlighting(finalSpeed);
  }

  document.querySelectorAll('input[name="boost"]').forEach(radio => {
    radio.addEventListener("change", calculateFinalSpeed);
  });

  document.getElementById("evInput").addEventListener("input", calculateFinalSpeed);

  /* ============================================================
     DEFAULT POKEMON
  ============================================================ */
  function setDefaultPokemon() {
    const defaultName = "Pikachu";

    nameSelector.value = defaultName;
    updateImagePreview(defaultName);

    document.querySelector('input[name="boost"][value="0"]').checked = true;

    calculateFinalSpeed();
  }

  setDefaultPokemon();

});
</script>

</body>
</html>
