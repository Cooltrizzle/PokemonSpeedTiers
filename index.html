<!DOCTYPE html>
<html>
<body>

<h1>CSV Loader Test</h1>
<pre id="output">Loading…</pre>

<script>
  fetch("VGChampions - SpeedTiersM-A.csv")
    .then(r => r.text())
    .then(text => {
      document.getElementById("output").textContent = text;
    })
    .catch(err => {
      document.getElementById("output").textContent = "Error loading CSV: " + err;
    });
</script>

</body>
</html>
