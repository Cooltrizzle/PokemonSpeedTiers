<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speed Tiers Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-container">

    <!-- ============================================================
         STATIC HEADER
    ============================================================ -->
    <div class="static-header">
      <table class="header-table">

        <!-- Column definitions (must match body table) -->
        <colgroup>
          <col class="col-1">
          <col class="col-2">
          <col class="col-3">
          <col class="col-4">
          <col class="col-5">
          <col class="col-6">
          <col class="col-7">
          <col class="col-8">
          <col class="col-9">
          <col class="col-10">
          <col class="col-11">
        </colgroup>

        <thead>

          <!-- ROW 1 -->
          <tr id="header-row-1">
            <th class="col-1" colspan="3" id="hdr-1-1">Loading…</th>
            <th class="col-4">Trick Room</th>
            <th class="col-5"></th>
            <th class="col-6" colspan="2">Max EVs</th>
            <th class="col-8" colspan="2">Single Boost / Scarf</th>
            <th class="col-10" colspan="2">Double Boost / Tailwind</th>
          </tr>

          <!-- ROW 2 -->
          <tr>
            <th class="col-1">Name</th>
            <th class="col-2">Image</th>
            <th class="col-3">Base Speed</th>
            <th class="col-4">Min Speed</th>
            <th class="col-5">Neutral</th>
            <th class="col-6">Neutral +32</th>
            <th class="col-7">Max +32</th>
            <th class="col-8">Neutral +32 / +1</th>
            <th class="col-9">Max +32 / +1</th>
            <th class="col-10">Neutral +32 / +2</th>
            <th class="col-11">Max +32 / +2</th>
          </tr>

        </thead>
      </table>
    </div>


    <!-- ============================================================
         SCROLLABLE TABLE BODY
    ============================================================ -->
    <div class="table-wrapper">
      <table id="csv-table">

        <!-- Column definitions (must match header table) -->
        <colgroup>
          <col class="col-1">
          <col class="col-2">
          <col class="col-3">
          <col class="col-4">
          <col class="col-5">
          <col class="col-6">
          <col class="col-7">
          <col class="col-8">
          <col class="col-9">
          <col class="col-10">
          <col class="col-11">
        </colgroup>

      </table>
    </div>

  </div> <!-- end page-container -->


  <!-- ============================================================
       SCRIPT — LOAD CSV + BUILD TABLE + FIX HEADER WIDTH
  ============================================================ -->
  <script>
  Promise.all([
    fetch("VGChampions - Regulation.csv").then(r => r.text()),
    fetch("VGChampions - SpeedTiersM-A.csv").then(r => r.text())
  ])
  .then(([regText, speedText]) => {

    /* ============================================================
       PARSE REGULATION CSV → BUILD LOOKUP TABLE
    ============================================================ */
    const regRows = regText.trim().split(/\r?\n/).map(r => r.split(","));
    const lookup = {};

    regRows.forEach((row, i) => {
      if (i === 0) return;
      const number = row[0].replace("#", "");
      const name = row[1].trim().toLowerCase();
      let form = (row[2] || "").trim().toLowerCase();
      if (form === "-" || form === "") form = "";
      if (!lookup[name]) lookup[name] = {};
      lookup[name][form] = number;
    });


    /* ============================================================
       PARSE SPEEDTIERS CSV → BUILD HEADER + DATA ROWS
    ============================================================ */
    const speedRows = speedText.trim().split(/\r?\n/).map(r => r.split(","));
    const table = document.getElementById("csv-table");

    // Set dynamic header text
    const headerText = speedRows[0][0] || "Header";
    document.getElementById("hdr-1-1").textContent = headerText;

    // Build table body
    const tbody = document.createElement("tbody");
    table.appendChild(tbody);

    speedRows.forEach((row, i) => {
      if (i < 2) return; // Skip header rows

      const tr = document.createElement("tr");

      row.forEach((cell, colIndex) => {
        const td = document.createElement("td");
        td.classList.add(`col-${colIndex + 1}`);

        // IMAGE COLUMN
        if (colIndex === 1) {
          let raw = row[0].trim();
          let baseName = raw;
          let formName = "";

          if (raw.toLowerCase().endsWith("-o")) {
            baseName = raw;
            formName = "";
          } else if (raw.includes("-")) {
            const idx = raw.indexOf("-");
            baseName = raw.substring(0, idx);
            formName = raw.substring(idx + 1);
          }

          const lookupForm = formName.toLowerCase();
          let fileFormName = formName.replace(/-/g, "_").replace(/ /g, "_");

          const nameKey = baseName.toLowerCase();
          const formKey = lookupForm;

          let number = null;

          if (lookup[nameKey] && lookup[nameKey][formKey]) {
            number = lookup[nameKey][formKey];
          } else if (!formKey && lookup[nameKey] && lookup[nameKey][""]) {
            number = lookup[nameKey][""];
          }

          if (number) {
            const img = document.createElement("img");
            img.src = formKey
              ? `Images/Menu_CP_${number}-${fileFormName}.png`
              : `Images/Menu_CP_${number}.png`;
            img.style.width = "40px";
            img.style.height = "40px";
            img.style.objectFit = "contain";
            td.appendChild(img);
          } else {
            td.textContent = "";
          }

        } else {
          td.textContent = cell;
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    /* ============================================================
       FIX HEADER COL-1 WIDTH TO MATCH BODY + BOTH SCROLLBAR GUTTERS
    ============================================================ */
    function adjustHeaderForScrollbar() {
      const wrapper = document.querySelector('.table-wrapper');
      const bodyCol1 = document.querySelector('#csv-table td.col-1, #csv-table th.col-1');
      const headerCol1 = document.querySelector('.header-table col.col-1');

      if (!wrapper || !bodyCol1 || !headerCol1) return;

      // Measure scrollbar width (0 on mobile, ~16px on desktop)
      const scrollbarWidth = wrapper.offsetWidth - wrapper.clientWidth;

      // Total gutter = left + right
      const totalGutter = scrollbarWidth * 2;

      // Measure actual rendered width of body col-1
      const bodyCol1Width = bodyCol1.getBoundingClientRect().width;

      // Apply explicit pixel width to header col-1
      headerCol1.style.width = `${bodyCol1Width + totalGutter}px`;
    }

    // Run after table loads
    setTimeout(adjustHeaderForScrollbar, 50);

    // Re-run on resize
    window.addEventListener('resize', adjustHeaderForScrollbar);

  });
  </script>

</body>
</html>
