<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Speed Tiers</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      background: white;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px 10px;
      white-space: nowrap;
      background: white;
    }

    /* Header row heights */
    tr:nth-child(1) th,
    tr:nth-child(2) th,
    tr:nth-child(2) td {
      height: 30px;
      line-height: 30px;
    }

    tr:nth-child(1) th {
  font-size: 20px; /* <--- add this */
}

    

    /* Zebra striping */
    tr:nth-child(even) td {
      background: #f2f2f2;
    }
  </style>
</head>

<body>

<h1>VGChampions Speed Tiers</h1>

<table id="csv-table"></table>

<script>
Promise.all([
  // Load both CSV files in parallel
  fetch("VGChampions - Regulation.csv").then(r => r.text()),
  fetch("VGChampions - SpeedTiersM-A.csv").then(r => r.text())
])
.then(([regText, speedText]) => {

  /* ---------------------------------------------------------
     PARSE REGULATION CSV
     Builds a lookup table:
       lookup[name][form] = number
     Example:
       lookup["charizard"]["mega y"] = "0006"
       lookup["kommo-o"][""] = "0783"
  --------------------------------------------------------- */
  const regRows = regText.trim().split(/\r?\n/).map(r => r.split(","));
  const lookup = {};

  regRows.forEach((row, i) => {
    if (i === 0) return; // Skip header row

    const number = row[0].replace("#", "");
    const name = row[1].trim().toLowerCase();
    let form = (row[2] || "").trim().toLowerCase();

    // "-" or empty = no form
    if (form === "-" || form === "") form = "";

    if (!lookup[name]) lookup[name] = {};
    lookup[name][form] = number;
  });

  /* ---------------------------------------------------------
     PARSE SPEEDTIERS CSV → build table
  --------------------------------------------------------- */
  const speedRows = speedText.trim().split(/\r?\n/).map(r => r.split(","));
  const table = document.getElementById("csv-table");

  speedRows.forEach((row, i) => {
    const tr = document.createElement("tr");

    // First two rows are headers
    if (i < 2) {
      row.forEach(cell => {
        const th = document.createElement("th");
        th.textContent = cell;
        tr.appendChild(th);
      });
      table.appendChild(tr);
      return;
    }

    /* ---------------------------------------------------------
       DATA ROWS
    --------------------------------------------------------- */
    row.forEach((cell, colIndex) => {
      const td = document.createElement("td");

      if (colIndex === 1) {

        /* ---------------------------------------------------------
           IMAGE COLUMN — parse name + form
           Handles:
             - Base forms
             - Single-hyphen forms
             - Multi-hyphen forms (Tauros-Paldea-Blaze)
             - Multi-word forms (Mega X)
             - Kommo-o family exception
        --------------------------------------------------------- */

        let raw = row[0].trim(); 
        let baseName = raw;
        let formName = "";

        // ⭐ RULE 1: Kommo-o family → NOT a form
        if (raw.toLowerCase().endsWith("-o")) {
          baseName = raw;
          formName = "";
        }

        // ⭐ RULE 2: Split on FIRST hyphen only
        else if (raw.includes("-")) {
          const idx = raw.indexOf("-");
          baseName = raw.substring(0, idx);
          formName = raw.substring(idx + 1); // EXACT form for lookup
        }

        // ⭐ lookupForm = EXACT form (spaces allowed)
        const lookupForm = formName.toLowerCase();

        // ⭐ filename form = underscores instead of spaces/hyphens
        let fileFormName = formName;
        fileFormName = fileFormName.replace(/-/g, "_"); // secondary hyphens
        fileFormName = fileFormName.replace(/ /g, "_"); // spaces

        const nameKey = baseName.toLowerCase();
        const formKey = lookupForm;

        let number = null;

        // Try form match
        if (lookup[nameKey] && lookup[nameKey][formKey]) {
          number = lookup[nameKey][formKey];
        }
        // Try base form
        else if (!formKey && lookup[nameKey] && lookup[nameKey][""]) {
          number = lookup[nameKey][""];
        }

        // ⭐ Build image if number found
        if (number) {
          const img = document.createElement("img");

          if (formKey) {
            img.src = `Images/Menu_CP_${number}-${fileFormName}.png`;
          } else {
            img.src = `Images/Menu_CP_${number}.png`;
          }

          img.style.width = "40px";
          img.style.height = "40px";
          img.style.objectFit = "contain";
          td.appendChild(img);
        } else {
          td.textContent = ""; // no match
        }

      } else {
        td.textContent = cell;
      }

      tr.appendChild(td);
    });

    table.appendChild(tr);
  });
});
</script>










</body>
</html>

</html>
