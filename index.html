<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speed Tiers Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-container">
  <h1 class="page-title">Pokemon Speed Tier Checker</h1>


  <!-- ============================================================
       CONTROL ROW — NAME → IMAGE → NATURE → EV → OUTPUT
  ============================================================ -->
  <div class="control-row">

  <!-- 1. NAME SELECTOR -->
  <div class="control-block">
    <div class="control-label">Pokemon</div>
    <input id="nameSelector" type="text" placeholder="Select a name..." autocomplete="off">
    <div id="nameDropdown" class="dropdown-list"></div>
  </div>

  <!-- 2. IMAGE PREVIEW -->
  <div class="control-block">
    <div class="control-label">&nbsp;</div> <!-- empty label -->
    <img id="selectedImage" src="" alt="" class="preview-img">
  </div>

  <!-- 3. NATURE -->
  <div class="control-block">
    <div class="control-label">Nature</div>
    <select id="natureSelect">
      <option value="beneficial">Beneficial</option>
      <option value="neutral" selected>Neutral</option>
      <option value="negative">Negative</option>
    </select>
  </div>

  <!-- 4. EVs -->
  <div class="control-block">
    <div class="control-label">EVs</div>
    <input id="evInput" type="number" min="0" max="32" placeholder="EVs (0–32)">
  </div>

  <!-- 5. SPEED OUTPUT -->
  <div class="control-block">
    <div class="control-label">Speed Stat</div>
    <div id="calcOutput" class="calc-box">—</div>
  </div>

</div>


  <!-- ============================================================
       SEARCH BOX — FILTERS TABLE ONLY
  ============================================================ -->
  <input id="searchBox" type="text" placeholder="Search name..." />


  <!-- ============================================================
       SCROLLABLE TABLE WITH STICKY HEADER
  ============================================================ -->
  <div class="table-wrapper">
    <table id="csv-table">

      <colgroup>
        <col class="col-1">
        <col class="col-2">
        <col class="col-3">
        <col class="col-4">
        <col class="col-5">
        <col class="col-6">
        <col class="col-7">
        <col class="col-8">
        <col class="col-9">
        <col class="col-10">
        <col class="col-11">
      </colgroup>

      <thead>
        <tr class="header-row-1">
          <th class="col-1" colspan="3" id="hdr-1-1">Loading…</th>
          <th class="col-4">Trick Room</th>
          <th class="col-5"></th>
          <th class="col-6" colspan="2">Max EVs</th>
          <th class="col-8" colspan="2">Single Boost / Scarf</th>
          <th class="col-10" colspan="2">Double Boost / Tailwind</th>
        </tr>

        <tr class="header-row-2">
          <th class="col-1">Name</th>
          <th class="col-2">Image</th>
          <th class="col-3">Base Speed</th>
          <th class="col-4">Min Speed</th>
          <th class="col-5">Neutral</th>
          <th class="col-6">Neutral +32</th>
          <th class="col-7">Max +32</th>
          <th class="col-8">Neutral +32 / +1</th>
          <th class="col-9">Max +32 / +1</th>
          <th class="col-10">Neutral +32 / +2</th>
          <th class="col-11">Max +32 / +2</th>
        </tr>
      </thead>

      <tbody></tbody>

    </table>
  </div>

</div> <!-- end page-container -->


<!-- ============================================================
     SCRIPT — LOAD CSV + BUILD TABLE + UI LOGIC
============================================================ -->
<script>
Promise.all([
  fetch("VGChampions - Regulation.csv").then(r => r.text()),
  fetch("VGChampions - SpeedTiersM-A.csv").then(r => r.text())
])
.then(([regText, speedText]) => {

  /* ============================================================
     PARSE REGULATION CSV → BUILD LOOKUP TABLE
  ============================================================ */
  const regRows = regText.trim().split(/\r?\n/).map(r => r.split(","));
  const lookup = {};

  regRows.forEach((row, i) => {
    if (i === 0) return;
    const number = row[0].replace("#", "");
    const name = row[1].trim().toLowerCase();
    let form = (row[2] || "").trim().toLowerCase();
    if (form === "-" || form === "") form = "";
    if (!lookup[name]) lookup[name] = {};
    lookup[name][form] = number;
  });


  /* ============================================================
     PARSE SPEEDTIERS CSV → BUILD HEADER + DATA ROWS
  ============================================================ */
  const speedRows = speedText.trim().split(/\r?\n/).map(r => r.split(","));
  const table = document.getElementById("csv-table");
  const tbody = table.querySelector("tbody");

  const headerText = speedRows[0][0] || "Header";
  document.getElementById("hdr-1-1").textContent = headerText;

  speedRows.forEach((row, i) => {
    if (i < 2) return;

    const tr = document.createElement("tr");

    row.forEach((cell, colIndex) => {
      const td = document.createElement("td");
      td.classList.add(`col-${colIndex + 1}`);

      /* IMAGE COLUMN */
      if (colIndex === 1) {
        let raw = row[0].trim();
        let baseName = raw;
        let formName = "";

        if (raw.toLowerCase().endsWith("-o")) {
          baseName = raw;
          formName = "";
        } else if (raw.includes("-")) {
          const idx = raw.indexOf("-");
          baseName = raw.substring(0, idx);
          formName = raw.substring(idx + 1);
        }

        const lookupForm = formName.toLowerCase();
        let fileFormName = formName.replace(/-/g, "_").replace(/ /g, "_");

        const nameKey = baseName.toLowerCase();
        const formKey = lookupForm;

        let number = null;

        if (lookup[nameKey] && lookup[nameKey][formKey]) {
          number = lookup[nameKey][formKey];
        } else if (!formKey && lookup[nameKey] && lookup[nameKey][""]) {
          number = lookup[nameKey][""];
        }

        if (number) {
          const img = document.createElement("img");
          img.src = formKey
            ? `Images/Menu_CP_${number}-${fileFormName}.png`
            : `Images/Menu_CP_${number}.png`;
          img.style.width = "40px";
          img.style.height = "40px";
          img.style.objectFit = "contain";
          td.appendChild(img);
        } else {
          td.textContent = "";
        }

      } else {
        td.textContent = cell;
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });


  /* ============================================================
     LOCK IN STICKY OFFSETS
  ============================================================ */
  const row1 = document.querySelector("#csv-table thead tr.header-row-1");
  const row2 = document.querySelector("#csv-table thead tr.header-row-2");

  if (row1 && row2) {
    const h = row1.getBoundingClientRect().height;
    row2.querySelectorAll("th").forEach(th => th.style.top = h + "px");
  }


  /* ============================================================
     SEARCH FILTER — FILTER ONLY COLUMN A
  ============================================================ */
  document.getElementById("searchBox").addEventListener("input", function () {
    const filter = this.value.toLowerCase();
    const rows = document.querySelectorAll("#csv-table tbody tr");

    rows.forEach(row => {
      const name = row.cells[0].textContent.toLowerCase();
      row.style.display = name.includes(filter) ? "" : "none";
    });
  });


  /* ============================================================
     AUTOCOMPLETE NAME SELECTOR
  ============================================================ */

  // Build name list from table
  const nameList = [];
  document.querySelectorAll("#csv-table tbody tr").forEach(row => {
    const name = row.cells[0].textContent.trim();
    if (name) nameList.push(name);
  });

  const selector = document.getElementById("nameSelector");
  const dropdown = document.getElementById("nameDropdown");

  function updateDropdown() {
    const filter = selector.value.toLowerCase();
    dropdown.innerHTML = "";

    const matches = nameList.filter(n => n.toLowerCase().includes(filter));

    matches.forEach(name => {
      const item = document.createElement("div");
      item.className = "dropdown-item";
      item.textContent = name;

      item.addEventListener("click", () => {
        selector.value = name;
        dropdown.style.display = "none";
        updateImagePreview(name);
        calculateFinalSpeed();
      });

      dropdown.appendChild(item);
    });

    dropdown.style.display = matches.length ? "block" : "none";
  }

  selector.addEventListener("input", updateDropdown);
  selector.addEventListener("focus", updateDropdown);

  // Close dropdown when clicking outside
  document.addEventListener("click", (e) => {
    if (!selector.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.style.display = "none";
    }
  });


  /* ============================================================
     EV INPUT — CLAMP BETWEEN 0 AND 32
  ============================================================ */
  const evInput = document.getElementById("evInput");

  evInput.addEventListener("input", () => {
    let val = parseInt(evInput.value, 10);

    if (isNaN(val)) {
      evInput.value = "";
      return;
    }

    if (val < 0) evInput.value = 0;
    if (val > 32) evInput.value = 32;

    calculateFinalSpeed();
  });


  /* ============================================================
     UPDATE IMAGE PREVIEW WHEN NAME SELECTED
  ============================================================ */
  function updateImagePreview(selectedName) {
    const img = document.getElementById("selectedImage");
    let foundSrc = "";

    document.querySelectorAll("#csv-table tbody tr").forEach(row => {
      const name = row.cells[0].textContent.trim();
      if (name.toLowerCase() === selectedName.toLowerCase()) {
        const imgTag = row.cells[1].querySelector("img");
        if (imgTag) foundSrc = imgTag.src;
      }
    });

    // If no image found → clear the preview
  if (!foundSrc) {
    img.removeAttribute("src");
    img.style.visibility = "hidden";
    return;
  }

  // If found → show it
  img.src = foundSrc;
  img.style.visibility = "visible";
}

  /* ============================================================
     FINAL SPEED CALCULATION
  ============================================================ */
  function calculateFinalSpeed() {
    const selectedName = document.getElementById("nameSelector").value.trim();
    const nature = document.getElementById("natureSelect").value;
    const ev = parseInt(document.getElementById("evInput").value, 10) || 0;

    if (!selectedName) {
      document.getElementById("calcOutput").textContent = "—";
      return;
    }

    // 1. Find the row for the selected Pokémon
    let baseSpeed = null;

    document.querySelectorAll("#csv-table tbody tr").forEach(row => {
      const name = row.cells[0].textContent.trim();
      if (name.toLowerCase() === selectedName.toLowerCase()) {
        baseSpeed = parseInt(row.cells[2].textContent.trim(), 10);
      }
    });

    if (baseSpeed === null) {
      document.getElementById("calcOutput").textContent = "—";
      return;
    }

    // 2. Base formula
    let finalSpeed = baseSpeed + 20 + ev;

    // 3. Apply nature
    if (nature === "beneficial") finalSpeed = Math.floor(finalSpeed * 1.1);
    if (nature === "negative") finalSpeed = Math.floor(finalSpeed * 0.9);

    // 4. Output
    document.getElementById("calcOutput").textContent = finalSpeed;
  }

  // Recalculate when name changes
  document.getElementById("nameSelector").addEventListener("input", calculateFinalSpeed);

  // Recalculate when nature changes
  document.getElementById("natureSelect").addEventListener("change", calculateFinalSpeed);

  // Recalculate when EV changes
  document.getElementById("evInput").addEventListener("input", calculateFinalSpeed);

});
</script>

</body>
</html>
