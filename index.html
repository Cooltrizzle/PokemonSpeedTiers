<!DOCTYPE html>
<html>
<body>

<h1>CSV Loader Test</h1>
<pre id="output">Loading…</pre>

<script>
  fetch("VGChampions-SpeedTiersM-A.csv")
    .then(r => r.text())
    .then(text => {
      const rows = text.trim().split(/\r?\n/).map(r => r.split(","));
      const table = document.createElement("table");

      rows.forEach((row, i) => {
        const tr = document.createElement("tr");

        row.forEach(cell => {
          const element = i === 0 ? "th" : "td";
          const td = document.createElement(element);
          td.textContent = cell;
          tr.appendChild(td);
        });

        table.appendChild(tr);
      });

      document.body.appendChild(table);
    })
    .catch(err => {
      document.body.innerHTML = "Error loading CSV: " + err;
    });
</script>


</body>
</html>
