<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Speed Tiers</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      background: white;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px 10px;
      white-space: nowrap;
      background: white;
    }

    /* Header row heights */
    tr:nth-child(1) th,
    tr:nth-child(2) th,
    tr:nth-child(2) td {
      height: 30px;
      line-height: 30px;
    }

    tr:nth-child(1) th {
  font-size: 20px; /* <--- add this */
}

    

    /* Zebra striping */
    tr:nth-child(even) td {
      background: #f2f2f2;
    }
  </style>
</head>

<body>

<h1>VGChampions Speed Tiers</h1>

<table id="csv-table"></table>

<script>
Promise.all([
  fetch("VGChampions - Regulation.csv").then(r => r.text()),
  fetch("VGChampions - SpeedTiersM-A.csv").then(r => r.text())
])
.then(([regText, speedText]) => {

  // --- Parse Regulation CSV ---
  const regRows = regText.trim().split(/\r?\n/).map(r => r.split(","));
  const nameToNumber = {};

  regRows.forEach((row, i) => {
    if (i === 0) return; // skip header
    const number = row[0]; // "#001"
    const name = row[1];   // "Bulbasaur"
    if (name && number) {
      nameToNumber[name.toLowerCase()] = number.replace("#", "");
    }
  });

  // --- Parse SpeedTiers CSV ---
  const speedRows = speedText.trim().split(/\r?\n/).map(r => r.split(","));
  const table = document.getElementById("csv-table");

  speedRows.forEach((row, i) => {
    const tr = document.createElement("tr");

    // Header rows (row 0 and row 1)
    if (i < 2) {
      row.forEach(cell => {
        const th = document.createElement("th");
        th.textContent = cell;
        tr.appendChild(th);
      });
      table.appendChild(tr);
      return;
    }

    // --- Data rows ---
    row.forEach((cell, colIndex) => {
      const td = document.createElement("td");

      if (colIndex === 1) {
        // Column 2 = IMAGE COLUMN
        const name = row[0].trim().toLowerCase();
        const number = nameToNumber[name];

        if (number) {
          const img = document.createElement("img");
          img.src = `images/Menu_Home_${number}.png`;
          img.style.width = "40px";
          img.style.height = "40px";
          img.style.objectFit = "contain";
          td.appendChild(img);
        } else {
          td.textContent = ""; // no match found
        }

      } else {
        td.textContent = cell;
      }

      tr.appendChild(td);
    });

    table.appendChild(tr);
  });
});
</script>


</body>
</html>

</body>
</html>
