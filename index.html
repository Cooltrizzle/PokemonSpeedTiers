<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speed Tiers Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================================================
       1. STATIC HEADER (Populated dynamically from CSV)
  ============================================================ -->
  <div class="static-header">
    <table class="header-table">
      <thead>

        <!-- ROW 1 (MERGED CELLS) — text inserted by JS -->
        <tr id="header-row-1">
          <th class="col-1" colspan="3" id="hdr-1-1">Loading…</th>
          <th class="col-4">Col4</th>
          <th class="col-5">Col5</th>
          <th class="col-6" colspan="2">Group A</th>
          <th class="col-8" colspan="2">Group B</th>
          <th class="col-10" colspan="2">Group C</th>
        </tr>

        <!-- ROW 2 (STATIC LABELS) -->
        <tr>
          <th class="col-1">Name</th>
          <th class="col-2">Image</th>
          <th class="col-3">???</th>
          <th class="col-4">Col4</th>
          <th class="col-5">Col5</th>
          <th class="col-6">A1</th>
          <th class="col-7">A2</th>
          <th class="col-8">B1</th>
          <th class="col-9">B2</th>
          <th class="col-10">C1</th>
          <th class="col-11">C2</th>
        </tr>

      </thead>
    </table>
  </div>


  <!-- ============================================================
       2. SCROLL WINDOW (Only data rows)
  ============================================================ -->
  <div class="table-wrapper">
    <table id="csv-table"></table>
  </div>


  <!-- ============================================================
       3. SCRIPT — LOAD CSV + BUILD HEADER + DATA ROWS
  ============================================================ -->
  <script>
  Promise.all([
    fetch("VGChampions - Regulation.csv").then(r => r.text()),
    fetch("VGChampions - SpeedTiersM-A.csv").then(r => r.text())
  ])
  .then(([regText, speedText]) => {

    /* ============================================================
       3.1 PARSE REGULATION CSV → BUILD LOOKUP + HEADER TEXT
    ============================================================ */
    const regRows = regText.trim().split(/\r?\n/).map(r => r.split(","));

    // ⭐ Insert Row1Col1 into the static header
    const headerText = regRows[0][0] || "Header";
    document.getElementById("hdr-1-1").textContent = headerText;

    // Build lookup table
    const lookup = {};
    regRows.forEach((row, i) => {
      if (i === 0) return;
      const number = row[0].replace("#", "");
      const name = row[1].trim().toLowerCase();
      let form = (row[2] || "").trim().toLowerCase();
      if (form === "-" || form === "") form = "";
      if (!lookup[name]) lookup[name] = {};
      lookup[name][form] = number;
    });


    /* ============================================================
       3.2 PARSE SPEEDTIERS CSV → BUILD ONLY DATA ROWS
    ============================================================ */
    const speedRows = speedText.trim().split(/\r?\n/).map(r => r.split(","));
    const table = document.getElementById("csv-table");

    const tbody = document.createElement("tbody");
    table.appendChild(tbody);

    speedRows.forEach((row, i) => {
      if (i < 2) return; // Skip header rows

      const tr = document.createElement("tr");

      row.forEach((cell, colIndex) => {
        const td = document.createElement("td");
        td.classList.add(`col-${colIndex + 1}`);

        /* ---------------------------------------------------------
           3.2A IMAGE COLUMN (COLUMN 2)
        --------------------------------------------------------- */
        if (colIndex === 1) {
          let raw = row[0].trim();
          let baseName = raw;
          let formName = "";

          if (raw.toLowerCase().endsWith("-o")) {
            baseName = raw;
            formName = "";
          } else if (raw.includes("-")) {
            const idx = raw.indexOf("-");
            baseName = raw.substring(0, idx);
            formName = raw.substring(idx + 1);
          }

          const lookupForm = formName.toLowerCase();
          let fileFormName = formName.replace(/-/g, "_").replace(/ /g, "_");

          const nameKey = baseName.toLowerCase();
          const formKey = lookupForm;

          let number = null;

          if (lookup[nameKey] && lookup[nameKey][formKey]) {
            number = lookup[nameKey][formKey];
          } else if (!formKey && lookup[nameKey] && lookup[nameKey][""]) {
            number = lookup[nameKey][""];
          }

          if (number) {
            const img = document.createElement("img");
            img.src = formKey
              ? `Images/Menu_CP_${number}-${fileFormName}.png`
              : `Images/Menu_CP_${number}.png`;
            img.style.width = "40px";
            img.style.height = "40px";
            img.style.objectFit = "contain";
            td.appendChild(img);
          } else {
            td.textContent = "";
          }

        } else {
          td.textContent = cell;
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

  });
  </script>

</body>
</html>
