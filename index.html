<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Speed Tiers</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .table-wrapper {
    width: 100%;
    max-height: 80vh; /* or whatever height you want */
    overflow: auto;   /* enables BOTH horizontal + vertical scroll */
    border: 1px solid #ccc;
    }


    table {
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px 10px;
      white-space: nowrap;
      background: white;
    }

    /* Zebra striping */
    tr:nth-child(even) td {
      background: #f2f2f2;
    }

    /* Freeze first 3 columns */
    td:nth-child(1), th:nth-child(1) {
      position: sticky;
      left: 0;
      z-index: 40; /* higher than header rows */
      background: White;
    }

    td:nth-child(2), th:nth-child(2) {
      position: sticky;
      left: 120px;
      z-index: 40;
      background: White;
    }

    td:nth-child(3), th:nth-child(3) {
      position: sticky;
      left: 240px;
      z-index: 40;
      background: White;
    }
      /* lock row 1 */
      tr:nth-child(1) th {
      position: sticky;
      top: 0;
      z-index: 50; /* keep above frozen columns */
      height: 30px;
      line-height: 30px;
      background: #333;
      color: white;
      }

    /* Lock row 2 */
    tr:nth-child(2) th,
    tr:nth-child(2) td {
    position: sticky;
    top: 30px; /* EXACT height of row 1 */
    z-index: 49;
    height: 30px;
    line-height: 30px;
    background: #444;
    color: white;
    }


  </style>
</head>

<body>

<h1>VGChampions Speed Tiers</h1>

<div class="table-wrapper">
  <table id="csv-table"></table>
</div>

<script>
  fetch("VGChampions - SpeedTiersM-A.csv")
    .then(r => r.text())
    .then(text => {
      const rows = text.trim().split(/\r?\n/).map(r => r.split(","));
      const table = document.getElementById("csv-table");

      rows.forEach((row, i) => {
        const tr = document.createElement("tr");

        // --- MERGE HEADER CELLS ON ROW 1 ---
        if (i === 0) {
          row.forEach((cell, colIndex) => {
            let th = document.createElement("th");

            // Merge col 6+7
            if (colIndex === 5) {
              th.colSpan = 2;
              th.textContent = row[5] + " / " + row[6];
              tr.appendChild(th);
            }

            // Skip col 7 because it's merged
            if (colIndex === 6) return;

            // Merge col 8+9
            if (colIndex === 7) {
              th = document.createElement("th");
              th.colSpan = 2;
              th.textContent = row[7] + " / " + row[8];
              tr.appendChild(th);
            }

            if (colIndex === 8) return;

            // Merge col 10+11
            if (colIndex === 9) {
              th = document.createElement("th");
              th.colSpan = 2;
              th.textContent = row[9] + " / " + row[10];
              tr.appendChild(th);
            }

            if (colIndex === 10) return;

            // Normal header cells
            if (![5,6,7,8,9,10].includes(colIndex)) {
              th = document.createElement("th");
              th.textContent = cell;
              tr.appendChild(th);
            }
          });

        } else {
          // Normal data rows
          row.forEach(cell => {
            const td = document.createElement("td");
            td.textContent = cell;
            tr.appendChild(td);
          });
        }

        table.appendChild(tr);
      });
    });
</script>

</body>
</html>
