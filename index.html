<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Speed Tiers</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      background: white;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px 10px;
      white-space: nowrap;
      background: white;
    }

    /* Header row heights */
    tr:nth-child(1) th,
    tr:nth-child(2) th,
    tr:nth-child(2) td {
      height: 30px;
      line-height: 30px;
    }

    tr:nth-child(1) th {
  font-size: 20px; /* <--- add this */
}

    

    /* Zebra striping */
    tr:nth-child(even) td {
      background: #f2f2f2;
    }
  </style>
</head>

<body>

<h1>VGChampions Speed Tiers</h1>

<table id="csv-table"></table>

<script>
  fetch("VGChampions - SpeedTiersM-A.csv")
    .then(r => r.text())
    .then(text => {
      const rows = text.trim().split(/\r?\n/).map(r => r.split(","));
      const table = document.getElementById("csv-table");

      rows.forEach((row, i) => {
        const tr = document.createElement("tr");

        // --- MERGE HEADER CELLS ON ROW 1 (still included) ---
        if (i === 0) {
          row.forEach((cell, colIndex) => {
            let th = document.createElement("th");

            // Merge col 6+7
            if (colIndex === 5) {
              th.colSpan = 2;
              th.textContent = row[5] + row[6];
              tr.appendChild(th);
            }

            if (colIndex === 6) return;

            // Merge col 8+9
            if (colIndex === 7) {
              th = document.createElement("th");
              th.colSpan = 2;
              th.textContent = row[7] + row[8];
              tr.appendChild(th);
            }

            if (colIndex === 8) return;

            // Merge col 10+11
            if (colIndex === 9) {
              th = document.createElement("th");
              th.colSpan = 2;
              th.textContent = row[9] + row[10];
              tr.appendChild(th);
            }

            if (colIndex === 10) return;

            // Normal header cells
            if (![5,6,7,8,9,10].includes(colIndex)) {
              th = document.createElement("th");
              th.textContent = cell;
              tr.appendChild(th);
            }
          });

        } else {
          row.forEach((cell, colIndex) => {
            const td = document.createElement("td");

            // Column 2 = image column (index 1)
            if (colIndex === 1) {
            const img = document.createElement("img");
            img.src = cell;
            img.style.width = "40px";
            img.style.height = "40px";
            img.style.objectFit = "contain";
            td.appendChild(img);
          } else {
          td.textContent = cell;
          }

        tr.appendChild(td);
        });

        }

        table.appendChild(tr);
      });
    });
</script>

</body>
</html>

</body>
</html>
