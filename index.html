<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VGChampions Speed Tiers</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 10px;
    }

    #table-container {
      margin-top: 20px;
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px 10px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #333;
      color: white;
      position: sticky;
      top: 0;
    }

    tr:nth-child(even) {
      background: #f0f0f0;
    }
  </style>
</head>

<body>

  <h1>VGChampions Speed Tiers</h1>
  <p>Loaded from: <strong>VGChampions-SpeedTiersM-A.csv</strong></p>

  <div id="table-container"></div>

  <script>
    async function loadCSV() {
      const response = await fetch("VGChampions-SpeedTiersM-A.csv");
      const text = await response.text();
      const rows = text.split("\n").map(r => r.split(","));

      renderTable(rows);
    }

    function renderTable(rows) {
      const container = document.getElementById("table-container");

      let html = "<table>";

      // Header row
      html += "<tr>";
      rows[0].forEach(col => {
        html += `<th>${col.trim()}</th>`;
      });
      html += "</tr>";

      // Data rows
      for (let i = 1; i < rows.length; i++) {
        html += "<tr>";
        rows[i].forEach(col => {
          html += `<td>${col.trim()}</td>`;
        });
        html += "</tr>";
      }

      html += "</table>";

      container.innerHTML = html;
    }

    loadCSV();
  </script>

</body>
</html>
